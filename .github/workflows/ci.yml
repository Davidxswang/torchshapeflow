name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: extensions/vscode/package-lock.json
      - run: uv sync --extra dev
      - run: uv run ruff format . --check
      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run mkdocs build
      - run: uv run python scripts/build_bundled_cli.py --output-root extensions/vscode/bin --clean --smoke-test
      - working-directory: extensions/vscode
        run: npm ci
      - working-directory: extensions/vscode
        run: npm run package

  bundled-cli-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: docker pull quay.io/pypa/manylinux2014_x86_64
      - run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -lc '
              set -euo pipefail &&
              /opt/python/cp312-cp312/bin/python --version &&
              /opt/python/cp312-cp312/bin/python -m pip install --disable-pip-version-check uv &&
              export PATH="/opt/python/cp312-cp312/bin:$PATH" &&
              uv python install 3.12 &&
              UV_PYTHON="$(uv python find 3.12)" &&
              "$UV_PYTHON" --version &&
              uv sync --extra dev --python "$UV_PYTHON" &&
              uv run --python "$UV_PYTHON" python scripts/build_bundled_cli.py --target linux-x64 --output-root extensions/vscode/bin --clean --smoke-test
            '

  bundled-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run python scripts/build_bundled_cli.py --target ${{ matrix.target }} --output-root extensions/vscode/bin --clean --smoke-test

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run pytest -q
