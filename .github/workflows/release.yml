name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-vsce-pat: ${{ steps.check.outputs.has-vsce-pat }}
      has-ovsx-pat: ${{ steps.check.outputs.has-ovsx-pat }}
    steps:
      - id: check
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          echo "has-vsce-pat=${{ secrets.VSCE_PAT != '' }}" >> "$GITHUB_OUTPUT"
          echo "has-ovsx-pat=${{ secrets.OVSX_PAT != '' }}" >> "$GITHUB_OUTPUT"

  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*

  build-bundled-cli-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: docker pull quay.io/pypa/manylinux2014_x86_64
      - run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -lc '
              set -euo pipefail &&
              /opt/python/cp312-cp312/bin/python --version &&
              /opt/python/cp312-cp312/bin/python -m pip install --disable-pip-version-check uv &&
              export PATH="/opt/python/cp312-cp312/bin:$PATH" &&
              uv python install 3.12 &&
              UV_PYTHON="$(uv python find 3.12)" &&
              "$UV_PYTHON" --version &&
              uv sync --extra dev --python "$UV_PYTHON" &&
              uv run --python "$UV_PYTHON" python scripts/build_bundled_cli.py --target linux-x64 --output-root extensions/vscode/bin --clean --smoke-test
            '
      - uses: actions/upload-artifact@v7
        with:
          name: bundled-cli-linux-x64
          path: extensions/vscode/bin/linux-x64/*

  build-bundled-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run python scripts/build_bundled_cli.py --target ${{ matrix.target }} --output-root extensions/vscode/bin --clean --smoke-test
      - uses: actions/upload-artifact@v7
        with:
          name: bundled-cli-${{ matrix.target }}
          path: extensions/vscode/bin/${{ matrix.target }}/*

  build-extension:
    needs: [build-bundled-cli-linux, build-bundled-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: extensions/vscode/package-lock.json
      - uses: actions/download-artifact@v8
        with:
          name: bundled-cli-linux-x64
          path: extensions/vscode/bin/linux-x64
      - uses: actions/download-artifact@v8
        with:
          name: bundled-cli-darwin-arm64
          path: extensions/vscode/bin/darwin-arm64
      - uses: actions/download-artifact@v8
        with:
          name: bundled-cli-win32-x64
          path: extensions/vscode/bin/win32-x64
      - working-directory: extensions/vscode
        run: npm ci
      - working-directory: extensions/vscode
        run: npm run package
      - uses: actions/upload-artifact@v7
        with:
          name: vscode-extension
          path: extensions/vscode/dist/*.vsix

  publish-vscode-marketplace:
    if: needs.check-secrets.outputs.has-vsce-pat == 'true' && !contains(github.ref, '-rc') && !contains(github.ref, '-test')
    needs: [check-secrets, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/download-artifact@v8
        with:
          name: vscode-extension
          path: vsix
      - env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish -p "$VSCE_PAT" --packagePath vsix/torchshapeflow.vsix

  publish-open-vsx:
    if: needs.check-secrets.outputs.has-ovsx-pat == 'true' && !contains(github.ref, '-rc') && !contains(github.ref, '-test')
    needs: [check-secrets, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/download-artifact@v8
        with:
          name: vscode-extension
          path: vsix
      - env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish vsix/torchshapeflow.vsix -p "$OVSX_PAT"

  publish-testpypi:
    if: contains(github.ref, '-rc') || contains(github.ref, '-test')
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: "!contains(github.ref, '-rc') && !contains(github.ref, '-test')"
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build-python, build-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist
      - uses: actions/download-artifact@v8
        with:
          name: vscode-extension
          path: extensions/vscode/dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            extensions/vscode/dist/*.vsix
