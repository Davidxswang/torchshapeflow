name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-vsce-pat: ${{ steps.check.outputs.has-vsce-pat }}
      has-ovsx-pat: ${{ steps.check.outputs.has-ovsx-pat }}
    steps:
      - id: check
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          echo "has-vsce-pat=${{ secrets.VSCE_PAT != '' }}" >> "$GITHUB_OUTPUT"
          echo "has-ovsx-pat=${{ secrets.OVSX_PAT != '' }}" >> "$GITHUB_OUTPUT"

  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: extensions/vscode/package-lock.json
      - working-directory: extensions/vscode
        run: npm ci
      - working-directory: extensions/vscode
        run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: extensions/vscode/dist/*.vsix

  publish-vscode-marketplace:
    if: needs.check-secrets.outputs.has-vsce-pat == 'true'
    needs: [check-secrets, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: extensions/vscode/package-lock.json
      - working-directory: extensions/vscode
        run: npm ci
      - working-directory: extensions/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish -p "$VSCE_PAT"

  publish-open-vsx:
    if: needs.check-secrets.outputs.has-ovsx-pat == 'true'
    needs: [check-secrets, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: extensions/vscode/package-lock.json
      - working-directory: extensions/vscode
        run: npm ci
      - working-directory: extensions/vscode
        run: npm run package
      - working-directory: extensions/vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish dist/torch-shape-flow.vsix -p "$OVSX_PAT"

  publish-pypi:
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build-python, build-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: extensions/vscode/dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            extensions/vscode/dist/*.vsix
